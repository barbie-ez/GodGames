<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary": "#293137",
                        "surface-container": "#1f1f23",
                        "surface-bright": "#39393d",
                        "primary-fixed": "#ffe16d",
                        "on-secondary-container": "#b1b9c0",
                        "on-surface-variant": "#d0c6ab",
                        "error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#5d4200",
                        "surface-container-lowest": "#0e0e12",
                        "on-primary-fixed-variant": "#544600",
                        "inverse-primary": "#705d00",
                        "tertiary-fixed-dim": "#f7bd48",
                        "secondary-fixed": "#dbe4ea",
                        "on-tertiary": "#412d00",
                        "on-primary": "#3a3000",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed": "#221b00",
                        "on-tertiary-fixed": "#271900",
                        "tertiary-fixed": "#ffdea6",
                        "surface-tint": "#e9c400",
                        "surface": "#131317",
                        "on-secondary-fixed-variant": "#40484d",
                        "surface-dim": "#131317",
                        "on-surface": "#e5e1e7",
                        "inverse-surface": "#e5e1e7",
                        "surface-container-highest": "#353439",
                        "on-primary-container": "#705e00",
                        "tertiary": "#fff5ea",
                        "tertiary-container": "#ffd486",
                        "surface-container-low": "#1b1b1f",
                        "background": "#131317",
                        "primary-fixed-dim": "#e9c400",
                        "primary-container": "#ffd700",
                        "outline": "#999077",
                        "on-secondary-fixed": "#151d22",
                        "on-tertiary-container": "#7c5900",
                        "secondary-container": "#424a50",
                        "primary": "#fff6df",
                        "on-error": "#690005",
                        "inverse-on-surface": "#303034",
                        "secondary": "#bfc8ce",
                        "outline-variant": "#4d4732",
                        "error": "#ffb4ab",
                        "surface-variant": "#353439",
                        "secondary-fixed-dim": "#bfc8ce",
                        "surface-container-high": "#2a292e",
                        "on-background": "#e5e1e7"
                    },
                    fontFamily: {
                        "headline": ["Newsreader"],
                        "body": ["Work Sans"],
                        "label": ["Work Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                },
            },
        }

<style>
        body {
            background-color: #050508;
            font-family: 'Work Sans', sans-serif;
            color: #e5e1e7;
        }
        .headline-font {
            font-family: 'Newsreader', serif;
        }
        .celestial-bg {
            background: radial-gradient(circle at 50% 50%, #131317 0%, #050508 100%);
            position: relative;
            overflow: hidden;
        }
        .star-field {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff6df, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #bfc8ce, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #FFD700, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 150px 150px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.2;
        }
        .monolith-card {
            background: linear-gradient(135deg, #1b1b1f 0%, #131317 100%);
            box-shadow: 0 0 40px 0 rgba(255, 215, 0, 0.05);
            position: relative;
        }
        .monolith-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at top right, rgba(255, 215, 0, 0.03), transparent 70%);
            pointer-events: none;
        }
        .solar-flare-btn {
            background: linear-gradient(135deg, #e9c400 0%, #fff6df 100%);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
            transition: all 0.4s ease;
        }
        .solar-flare-btn:hover {
            box-shadow: 0 4px 30px rgba(255, 215, 0, 0.4);
            transform: translateY(-1px);
        }
        .input-altar {
            border: none;
            border-bottom: 1px solid #4d4732;
            background: transparent !important;
            transition: border-color 0.4s ease;
        }
        .input-altar:focus {
            border-bottom-color: #fff6df;
            outline: none;
            box-shadow: 0 10px 20px -10px rgba(255, 215, 0, 0.05);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="celestial-bg min-h-screen flex items-center justify-center p-6">
<div class="star-field"></div>
<!-- Abstract Celestial Elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] rounded-full bg-primary-container/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[300px] h-[300px] rounded-full bg-surface-container-highest/10 blur-[100px]"></div>
</div>
<main class="relative z-10 w-full max-w-[440px]">
<!-- Branding Anchor -->
<div class="text-center mb-12">
<div class="inline-block p-4 mb-6 relative">
<span class="material-symbols-outlined text-primary-container text-5xl opacity-80" data-icon="auto_awesome">auto_awesome</span>
<div class="absolute inset-0 bg-primary-container/10 blur-xl rounded-full"></div>
</div>
<h1 class="headline-font text-4xl md:text-5xl font-medium tracking-[0.05em] text-primary mb-4">
                Return to the Pantheon
            </h1>
<p class="font-body text-secondary text-lg tracking-wide opacity-80">
                The realm awaits your guidance
            </p>
</div>
<!-- Auth Card -->
<div class="monolith-card p-10 md:p-12 border-none">
<form class="space-y-10">
<!-- Identity Input -->
<div class="relative group">
<label class="block font-label text-[10px] uppercase tracking-[0.2em] text-outline mb-2" for="identity">Divine Identifier</label>
<div class="relative">
<span class="absolute left-0 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors duration-500" data-icon="temp_preferences_custom">temp_preferences_custom</span>
<input class="input-altar w-full py-3 pl-10 text-on-surface placeholder:text-outline/40 font-body" id="identity" name="identity" placeholder="Your celestial essence" type="text"/>
</div>
</div>
<!-- Cipher Input -->
<div class="relative group">
<div class="flex justify-between items-end mb-2">
<label class="block font-label text-[10px] uppercase tracking-[0.2em] text-outline" for="cipher">Astral Cipher</label>
<a class="text-[10px] uppercase tracking-[0.1em] text-primary-fixed-dim hover:text-primary transition-colors duration-500" href="#">Lost Key?</a>
</div>
<div class="relative">
<span class="absolute left-0 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors duration-500" data-icon="key">key</span>
<input class="input-altar w-full py-3 pl-10 text-on-surface placeholder:text-outline/40 font-body" id="cipher" name="cipher" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action -->
<div class="pt-4">
<button class="solar-flare-btn w-full py-5 text-on-primary font-label text-xs font-bold uppercase tracking-[0.25em] flex items-center justify-center gap-3" type="submit">
                        Enter the Realm
                        <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Social/Alt Login -->
<div class="mt-12 pt-8 border-t border-outline-variant/20">
<p class="text-center font-label text-[10px] uppercase tracking-[0.2em] text-outline mb-6">Or manifest via</p>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-low hover:bg-surface-container transition-colors duration-500 border border-outline-variant/10">
<span class="material-symbols-outlined text-secondary text-lg" data-icon="flare">flare</span>
<span class="text-[10px] uppercase tracking-widest text-secondary">Solaris</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-low hover:bg-surface-container transition-colors duration-500 border border-outline-variant/10">
<span class="material-symbols-outlined text-secondary text-lg" data-icon="nights_stay">nights_stay</span>
<span class="text-[10px] uppercase tracking-widest text-secondary">Lunar</span>
</button>
</div>
</div>
</div>
<!-- Footer Note -->
<div class="mt-10 text-center">
<p class="font-body text-secondary/60 text-sm tracking-wide">
                New to the Pantheon? 
                <a class="text-primary-fixed-dim hover:text-primary transition-colors duration-500 ml-1 font-medium" href="#">Inscribe Your Name</a>
</p>
</div>
</main>
<!-- Decorative Corner Ornaments -->
<div class="fixed top-8 left-8 hidden lg:block">
<div class="w-12 h-12 border-l border-t border-primary-container/30"></div>
</div>
<div class="fixed bottom-8 right-8 hidden lg:block">
<div class="w-12 h-12 border-r border-b border-primary-container/30"></div>
</div>
<!-- Background Image context for AI -->
<div class="hidden">
<img alt="Celestial Background" data-alt="high resolution deep space photography showing distant golden nebulae and cold white stars against a pure obsidian void" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCGBcwQSX-kMnQxZbgnUR_2S9JHFYmXaUeZLYRDxEXIgLi-fTdlSicWTo_mmdgPKdE54giOMD7QM_y3Bqd8ASrZGxIR74p26dp5hbPJJ7tTohQp4dviFqBB9xMIAVroIpI0EzJ0t5eCX-S1AVd0WymQYqbx12W3GaQz9G9U71gAQGbKt9bOQGyp7ssRZ1ADLLBrDUJtMBvsEAUXdJPlLLqB1xvspmDj4-5XedC79THgjX-9veJw4bKh4WZxHdJbQvQEt4FpcZecuQk"/>
</div>
</body></html>
